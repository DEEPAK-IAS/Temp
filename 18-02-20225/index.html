<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      width: 100vw;
      z-index: -10;
    }

    header {
      height: 70px;
      width: 100%;
      background-color: rgb(0, 13, 255);
      display: flex;
      align-items: center;
      justify-content: space-around;
    }

    #logo {
      height: 60px;
      width: 230px;
    }

    nav {
      width: 400px;
      display: flex;
      justify-content: space-around;
    }


    nav a {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-decoration: none;
      font-size: 20px;
      font-weight: 550;
      color: white;
    }

    #three-line {
      height: 35px;
      width: 35px;
      color: white;
      display: none;
    }

    

    @media all and (max-width: 750px) {
      nav {
        flex-direction: column;
        width: 250px;
        height: 300px;
        background-color: white;
        position: absolute;
        top: 70px;
        right: 0;
        z-index: 10;
        box-shadow: 2px 2px 10px black;
        text-align: center;
      }
      nav a {
        color: black;
      }
      .d-none {
        display: none;
      }

      #three-line {
        display: block;
      }
    }

    @media all and (min-width: 750px) {
      
    }



  </style>


</head>
<body>
  

  <header>
    <img id="logo" src="./cropped-Cadd-Cae-Logo_n.webp" alt="alternate">
    <nav class="d-none">
      <a href="#">Home</a>
      <a href="#">Algorian</a>
      <a href="#">Cadd Cae jobs</a>
      <a href="#">Contact</a>
    </nav>
    <img src="../imgs/menu.png" alt="" id="three-line">
  </header>

  <script>
    const menuBTN = document.querySelector("#three-line");
    const nav = document.querySelector("nav");
    menuBTN.addEventListener("click", (e) => {
      nav.classList.toggle("d-none");
    })
  </script>

</body>
</html>
