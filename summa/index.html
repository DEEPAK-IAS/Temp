<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>

    *{
      margin: 0;
      padding: 0;      
    }

    body {
      height: 100vh;
      width: 100vw;
    }

    
    .container {
      height: 500px;
      width: 300px;
      background-color: rgb(255, 255, 255);
      margin: 100px auto;
      border-radius: 10px;
      box-shadow: 1px 1px 10px rgba(0, 0, 0, 0.618);
    }

    h1 {
      text-align: center;
      padding-top: 40px;
      font-family: sans-serif;
      margin-bottom: 60px;
    }

    .input-group-container {
      height: 200px;
      width: 100%;
      padding-top: 10px;
    }

    .input-group {
      height: 60px;
      width: 80%;
      margin: auto;
      margin-bottom: 20px;
      position: relative;
    }

    .input-group input {
      width: 98.9%;
      height: 40px;
      background-color: transparent;
      border: 2px solid black;
      outline: none;
      border-radius: 5px;
      font-size: 20px;
      text-indent: 10px;
    }

    .input-group label {
      position: absolute;
      top: 12px;
      left: 10px;
      font-size: 16px;
      font-family: sans-serif;
    }


    .input-group input:focus + label,
    .input-group input:valid + label {
      top: -10px;
      font-size: 14px;
      background-color: white;
    }


    .input-group .err-element {
      font-size: 10px;
      font-weight: 550;
      font-family: sans-serif;
      letter-spacing: 2px;
      color: red;
    }

    button {
      width: 80%;
      height: 40px;
      margin-left: 10%;
      background-color: blue;
      color: white;
      font-size: 20px;
      font-family: sans-serif;
      border: none;
      border-radius: 5px;
    }

    .redirect {
      margin-left: 14%;
      margin-top: 5px;
      font-family: sans-serif;
    }

    .redirect a {
      text-decoration: none;
    }

  </style>

</head>
<body>
  
  <div class="container">
    <form>

      <h1>Sign In</h1>

      <div class="input-group-container">
        <div class="input-group">
          <input type="text" required>
          <label for="">Name</label>
          <p class="err-element"></p>
        </div>
        <div class="input-group">
          <input type="text" required>
          <label for="">Email</label>
          <p class="err-element"></p>
        </div>
      </div>


      <button>SignIn</button>
      <p class="redirect">Don't have an account <a href="signup">signup</a></p>

    </form>
  </div>

</body>
</html>
