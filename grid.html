<html>
<head>
  <style>


    div {
      height: 100px;
      width: 100px;
      background-color: coral;
      position: absolute;
      animation-name: ani;
      animation-duration: 7s;
      animation-iteration-count: infinite;
    }

    @keyframes ani {
      /* from {
        top: 0;
        left: 0;
      }
      to {
        top:0;
        left: 200px;
      } */

      0% {top: 0; left: 0}
      25% {top: 0; left: 100px}
      50% {top: 100px; left: 100px}
      75% {top: 100px; left: 0}
      100% {top: 0; left: 0}
    }





  </style>
</head>
<body>
  
  <div></div>
  
</body>
</html>
